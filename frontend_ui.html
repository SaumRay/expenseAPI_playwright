<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0e0e10;
      --surface:   #17171a;
      --surface2:  #1f1f23;
      --border:    #2a2a2f;
      --accent:    #c8f135;
      --accent2:   #6c63ff;
      --text:      #f0efe8;
      --muted:     #6b6b72;
      --danger:    #ff5f5f;
      --food:      #ffb347;
      --transport: #6c63ff;
      --health:    #4ecdc4;
      --shopping:  #ff6b9d;
      --other:     #95a5a6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 28px 48px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.5px;
    }
    header h1 span { color: var(--accent); font-style: italic; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
      margin-left: auto;
      align-self: center;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 0;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 48px;
      gap: 40px;
    }

    /* ── Panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
    }
    .panel-title {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    select option { background: var(--surface2); }

    .btn-submit {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      background: var(--accent);
      color: #0e0e10;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      letter-spacing: 0.3px;
    }
    .btn-submit:hover { opacity: .88; }
    .btn-submit:active { transform: scale(.98); }
    .btn-submit:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      opacity: 0;
      transition: all .3s;
      pointer-events: none;
      z-index: 99;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: var(--accent); color: var(--accent); }
    #toast.error   { border-color: var(--danger); color: var(--danger); }

    /* ── Right column ── */
    .right { display: flex; flex-direction: column; gap: 28px; }

    /* ── Stats row ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
    }
    .stat-label {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: 'DM Serif Display', serif;
      font-size: 30px;
      color: var(--text);
    }
    .stat-value.accent { color: var(--accent); }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: #0e0e10; border-color: var(--accent); font-weight: 500; }

    /* ── Expense list ── */
    .expense-list { display: flex; flex-direction: column; gap: 10px; }

    .expense-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color .2s, transform .15s;
      animation: slideIn .25s ease;
    }
    @keyframes slideIn { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }
    .expense-item:hover { border-color: var(--border); transform: translateX(2px); }

    .cat-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .expense-info { flex: 1; min-width: 0; }
    .expense-title {
      font-size: 14px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .expense-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      font-family: 'DM Mono', monospace;
    }
    .expense-amount {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      color: var(--text);
      flex-shrink: 0;
    }
    .btn-delete-item {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color .2s, background .2s;
      flex-shrink: 0;
    }
    .btn-delete-item:hover { color: var(--danger); background: rgba(255,95,95,.1); }

    .empty-state {
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
      font-size: 14px;
    }
    .empty-state .icon { font-size: 36px; margin-bottom: 12px; }

    /* ── Loading skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 12px;
      height: 64px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .cat-color { --c: var(--other); }
    [data-cat="food"]      { --c: var(--food); }
    [data-cat="transport"] { --c: var(--transport); }
    [data-cat="health"]    { --c: var(--health); }
    [data-cat="shopping"]  { --c: var(--shopping); }
    [data-cat="other"]     { --c: var(--other); }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; padding: 24px 20px; }
      header { padding: 20px 24px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <h1>expense <span>tracker</span></h1>
  <span id="server-status" class="status-dot" title="API connected"></span>
</header>

<div class="layout">

  <!-- ── Left: Add expense form ── -->
  <aside>
    <div class="panel">
      <p class="panel-title">// new expense</p>
      <div class="form-group">
        <label>Title</label>
        <input id="f-title" type="text" placeholder="e.g. Lunch at Cafe" />
      </div>
      <div class="form-group">
        <label>Amount (₹)</label>
        <input id="f-amount" type="number" min="0.01" step="0.01" placeholder="0.00" />
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="f-category">
          <option value="food">🍔 Food</option>
          <option value="transport">🚌 Transport</option>
          <option value="health">💊 Health</option>
          <option value="shopping">🛍️ Shopping</option>
          <option value="other">📦 Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input id="f-date" type="date" />
      </div>
      <button class="btn-submit" id="add-btn" onclick="addExpense()">Add Expense</button>
    </div>
  </aside>

  <!-- ── Right: Stats + list ── -->
  <div class="right">

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total spent</div>
        <div class="stat-value accent" id="stat-total">₹0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Expenses</div>
        <div class="stat-value" id="stat-count">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Top category</div>
        <div class="stat-value" id="stat-top" style="font-size:20px">—</div>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="panel" style="padding: 18px 22px;">
      <div class="filters">
        <button class="filter-btn active" data-filter="all"    onclick="setFilter(this, 'all')">All</button>
        <button class="filter-btn" data-filter="food"          onclick="setFilter(this, 'food')">🍔 Food</button>
        <button class="filter-btn" data-filter="transport"     onclick="setFilter(this, 'transport')">🚌 Transport</button>
        <button class="filter-btn" data-filter="health"        onclick="setFilter(this, 'health')">💊 Health</button>
        <button class="filter-btn" data-filter="shopping"      onclick="setFilter(this, 'shopping')">🛍️ Shopping</button>
        <button class="filter-btn" data-filter="other"         onclick="setFilter(this, 'other')">📦 Other</button>
      </div>
    </div>

    <!-- Expense list -->
    <div class="panel" style="flex:1;">
      <p class="panel-title">// expenses</p>
      <div class="expense-list" id="expense-list">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
  const API = '/api/expenses';
  let allExpenses = [];
  let activeFilter = 'all';

  const catColors = {
    food: '#ffb347', transport: '#6c63ff',
    health: '#4ecdc4', shopping: '#ff6b9d', other: '#95a5a6'
  };
  const catEmoji = {
    food:'🍔', transport:'🚌', health:'💊', shopping:'🛍️', other:'📦'
  };

  // Set today as default date
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

  // ── API calls ──────────────────────────────────────────

  async function fetchExpenses() {
    try {
      const res = await fetch(API);
      allExpenses = await res.json();
      renderList();
      updateStats();
    } catch {
      toast('Cannot reach API server', 'error');
      document.getElementById('expense-list').innerHTML =
        `<div class="empty-state"><div class="icon">⚠️</div>Could not connect to server.<br/>Make sure server_main.js is running.</div>`;
    }
  }

  async function addExpense() {
    const title    = document.getElementById('f-title').value.trim();
    const amount   = parseFloat(document.getElementById('f-amount').value);
    const category = document.getElementById('f-category').value;
    const date     = document.getElementById('f-date').value;

    if (!title)         return toast('Please enter a title', 'error');
    if (!amount || amount <= 0) return toast('Enter a valid amount', 'error');

    const btn = document.getElementById('add-btn');
    btn.disabled = true;
    btn.textContent = 'Adding…';

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, amount, category, date: date || undefined })
      });
      if (!res.ok) {
        const err = await res.json();
        return toast(err.error || 'Failed to add', 'error');
      }
      document.getElementById('f-title').value  = '';
      document.getElementById('f-amount').value = '';
      toast(`Added "${title}"`, 'success');
      fetchExpenses();
    } catch {
      toast('Server error', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add Expense';
    }
  }

  async function deleteExpense(id, title) {
    try {
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      toast(`Deleted "${title}"`, 'success');
      fetchExpenses();
    } catch {
      toast('Could not delete', 'error');
    }
  }

  // ── Render ─────────────────────────────────────────────

  function renderList() {
    const list = document.getElementById('expense-list');
    const filtered = activeFilter === 'all'
      ? allExpenses
      : allExpenses.filter(e => e.category === activeFilter);

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">🪹</div>No expenses${activeFilter !== 'all' ? ' in this category' : ' yet'}.<br/>Add one using the form.</div>`;
      return;
    }

    // Sort newest first
    const sorted = [...filtered].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

    list.innerHTML = sorted.map(e => `
      <div class="expense-item" data-cat="${e.category}">
        <div class="cat-dot" style="background:${catColors[e.category] || catColors.other}"></div>
        <div class="expense-info">
          <div class="expense-title">${escHtml(e.title)}</div>
          <div class="expense-meta">${catEmoji[e.category] || '📦'} ${e.category} · ${formatDate(e.date)}</div>
        </div>
        <div class="expense-amount">₹${e.amount.toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2})}</div>
        <button class="btn-delete-item" onclick="deleteExpense('${e.id}', '${escHtml(e.title).replace(/'/g,"\\'")}')">✕</button>
      </div>
    `).join('');
  }

  function updateStats() {
    const total = allExpenses.reduce((s, e) => s + e.amount, 0);
    document.getElementById('stat-total').textContent =
      '₹' + total.toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});
    document.getElementById('stat-count').textContent = allExpenses.length;

    // Top category
    const bycat = {};
    allExpenses.forEach(e => bycat[e.category] = (bycat[e.category] || 0) + e.amount);
    const top = Object.entries(bycat).sort((a,b) => b[1]-a[1])[0];
    document.getElementById('stat-top').textContent =
      top ? `${catEmoji[top[0]]} ${top[0]}` : '—';
  }

  function setFilter(btn, filter) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = filter;
    renderList();
  }

  // ── Helpers ────────────────────────────────────────────

  function formatDate(d) {
    if (!d) return '';
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 3000);
  }

  // Allow Enter on title/amount to submit
  ['f-title','f-amount'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') addExpense();
    });
  });

  fetchExpenses();
</script>
</body>
</html>
