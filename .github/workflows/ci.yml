name: Expense Tracker CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Install Playwright browsers ───────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── 5. Run original API tests (server.js) ────────
      - name: Run API tests (server.js)
        run: npx playwright test expenses.spec.js --reporter=list
        env:
          CI: true

      # ── 6. Run UI + API tests (server_main.js) ───────
      - name: Run UI + API tests (server_main.js)
        run: npx playwright test expenses_main.spec.js --reporter=list
        env:
          CI: true

      # ── 7. Upload test report (always, even on fail) ──
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14